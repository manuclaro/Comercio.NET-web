<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas del Día</title>
    <link rel="stylesheet" href="/css/mesas.css" />
</head>
<body>

    <header>
        <button class="btn-back" onclick="location.href='/dashboard-pizzeria.html'">← Panel</button>
        <h1>📊 Ventas del Día</h1>
        <div class="header-user">
            <span id="nombreUsuarioVentas"></span>
            <button id="btnSalir" class="btn-back">Cerrar Sesión</button>
        </div>
    </header>

    <div class="container">

        <!-- ── Vista: listado ─────────────────────────────────────────── -->
        <div id="vistaListado">

            <!-- Filtros -->
            <div class="form-item">
                <div class="field">
                    <label>Mozo</label>
                    <select id="filtroMozo">
                        <option value="">Todos los mozos</option>
                    </select>
                </div>
                <div class="field">
                    <label>Forma de pago</label>
                    <select id="filtroFormaPago">
                        <option value="">Todas las formas de pago</option>
                    </select>
                </div>
                <div class="field">
                    <label>Estado</label>
                    <select id="filtroEstado">
                        <option value="">Todos</option>
                        <option value="Abierta">Abierta</option>
                        <option value="Cerrada">Cerrada</option>
                    </select>
                </div>
                <div class="filtros-acciones">
                    <button id="btnFiltrar" class="btn-primary">Filtrar</button>
                    <button id="btnLimpiarFiltros" class="btn-secondary">Limpiar</button>
                </div>
            </div>

            <!-- Resumen -->
            <p id="resumenDia" class="resumen-dia"></p>

            <!-- Tabla -->
            <div class="tabla-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Mesa</th>
                            <th>Mozo</th>
                            <th>Apertura</th>
                            <th class="col-cierre">Cierre</th>
                            <th>Estado</th>
                            <th style="text-align:right">Total</th>
                            <th>Forma de pago</th>
                            <th class="col-ver-detalle"></th>
                        </tr>
                    </thead>
                    <tbody id="bodyVentas"></tbody>
                </table>
            </div>
            <p id="mensajeVacioVentas" class="mensaje-vacio" style="display:none">
                No hay ventas registradas para hoy.
            </p>
        </div>

        <!-- ── Vista: detalle de mesa ─────────────────────────────────── -->
        <div id="vistaDetalle" style="display:none">
            <div class="detalle-header">
                <button id="btnVolverVentas" class="btn-secondary">← Volver</button>
                <h2 id="tituloDet"></h2>
            </div>

            <div class="tabla-wrap">
                <table>
                    <thead>
                        <tr>
                            <th class="col-codigo">Código</th>
                            <th>Descripción</th>
                            <th style="text-align:center">Cant.</th>
                            <th style="text-align:right">Precio unit.</th>
                            <th style="text-align:right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="bodyDetalle"></tbody>
                </table>
            </div>

            <div class="pie-detalle">
                <span id="totalDetalleDia" class="total-mesa">Total: $ 0,00</span>
            </div>
        </div>

    </div>

    <script src="/js/ventas-mesas.js"></script>
</body>
</html>
