<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas del Día</title>
    <link rel="stylesheet" href="/css/mesas.css" />
</head>
<body>
    <header>
        <button class="btn-back" onclick="location.href='/dashboard-pizzeria.html'">← Panel</button>
        <h1>📊 Ventas del Día</h1>
        <div class="header-user">
            <span id="nombreUsuarioVentas"></span>
            <button id="btnSalir" class="btn-back">Cerrar Sesión</button>
        </div>
    </header>

    <div class="container">

        <!-- Resumen total -->
        <div id="resumenDia" style="margin-bottom:1.2rem;font-size:1.1rem;font-weight:600;color:#e65100"></div>

        <!-- Listado -->
        <div id="vistaListado">
            <div class="tabla-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Mesa</th>
                            <th>Mozo</th>
                            <th>Apertura</th>
                            <th>Cierre</th>
                            <th>Estado</th>
                            <th style="text-align:right">Total</th>
                            <th>Pago</th>
                        </tr>
                    </thead>
                    <tbody id="bodyVentas"></tbody>
                </table>
            </div>
            <p id="mensajeVacioVentas" class="mensaje-vacio" style="display:none">No hay registros para hoy.</p>
        </div>

        <!-- Detalle de mesa seleccionada -->
        <div id="vistaDetalle" style="display:none">
            <button id="btnVolverVentas" class="btn-secondary" style="margin-bottom:1rem">← Volver</button>
            <h2 id="tituloDet"></h2>
            <div class="tabla-wrap" style="margin-top:1rem">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Descripción</th>
                            <th style="text-align:center">Cant.</th>
                            <th style="text-align:right">Precio unit.</th>
                            <th style="text-align:right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="bodyDetalle"></tbody>
                </table>
            </div>
            <div class="pie-detalle">
                <span id="totalDetalleDia" class="total-mesa"></span>
            </div>
        </div>

    </div>

    <script src="/js/ventas-mesas.js"></script>
</body>
</html>
