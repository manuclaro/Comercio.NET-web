<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos del Bar</title>
    <link rel="stylesheet" href="/css/mesas.css?v=2" />
</head>
<body>
    <header>
        <button class="btn-back" onclick="location.href='/dashboard-pizzeria.html'">← Panel</button>
        <h1>🍺 Productos del Bar</h1>
        <div class="header-user">
            <span id="nombreUsuarioProd"></span>
            <button id="btnSalir" class="btn-back">Cerrar Sesión</button>
        </div>
    </header>

    <div class="container">
        <div class="acciones">
            <button id="btnNuevoProducto" class="btn-primary">+ Nuevo producto</button>
        </div>
        <div class="tabla-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="col-codigo">Código</th>
                        <th>Descripción</th>
                        <th style="text-align:right">Precio</th>
                        <th style="text-align:center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="bodyProductos"></tbody>
            </table>
        </div>
        <p id="mensajeVacioProd" class="mensaje-vacio" style="display:none">No hay productos cargados.</p>
    </div>

    <div id="modalProducto" class="modal-overlay">
        <div class="modal">
            <h3 id="tituloModalProducto">Agregar producto</h3>
            <form id="formProducto">
                <input type="hidden" id="inputIdProd" />
                <div class="campo">
                    <label>Código</label>
                    <input type="text" id="inputCodigoProd" placeholder="Opcional" />
                </div>
                <div class="campo">
                    <label>Descripción *</label>
                    <input type="text" id="inputDescripcionProd" placeholder="Ej: Cerveza 500ml" required />
                </div>
                <div class="campo">
                    <label>Precio *</label>
                    <input type="number" id="inputPrecioProd" min="0" step="0.01" placeholder="0.00" required />
                </div>
                <div class="modal-acciones">
                    <button type="button" id="btnCancelarProducto" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/productos-bar.js?v=2"></script>
</body>
</html>
