<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0078d7">
    <title>Arqueo de Caja - Comercio.NET</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏪 Arqueo de Caja</h1>
            <p class="subtitle">Comercio.NET Mobile</p>
        </header>

        <div class="filters">
            <div class="date-selector">
                <label for="fecha">📅 Fecha:</label>
                <input type="date" id="fecha" />
            </div>

            <div class="cajero-selector">
                <label for="cajero">👤 Cajero:</label>
                <select id="cajero">
                    <option value="">Todos los cajeros</option>
                </select>
            </div>

            <button id="btnHoy" class="btn btn-primary">Hoy</button>
            <button id="btnActualizar" class="btn btn-success">🔄 Actualizar</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Cargando datos...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="resultado" class="resultado" style="display: none;">
            <div class="card total">
                <h2>💰 Total del Día</h2>
                <p class="total-amount" id="totalIngresos">$0.00</p>
                <p class="cajero-info" id="cajeroInfo"></p>
            </div>

            <div class="card">
                <h3>📊 Desglose</h3>
                <div class="detalle">
                    <div class="detalle-item">
                        <span class="label">🪪 DNI:</span>
                        <span class="value" id="dni">$0.00</span>
                    </div>
                    <div class="detalle-item">
                        <span class="label">💵 Efectivo:</span>
                        <span class="value" id="efectivo">$0.00</span>
                    </div>
                    <div class="detalle-item">
                        <span class="label">📱 Mercado Pago:</span>
                        <span class="value" id="mercadoPago">$0.00</span>
                    </div>
                    <div class="detalle-item">
                        <span class="label">📝 Otro:</span>
                        <span class="value" id="otro">$0.00</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>📋 Información</h3>
                <div class="detalle">
                    <div class="detalle-item">
                        <span class="label">🧾 Ventas:</span>
                        <span class="value" id="cantidadVentas">0</span>
                    </div>
                    <div class="detalle-item">
                        <span class="label">📅 Fecha:</span>
                        <span class="value" id="fechaConsulta">-</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Última actualización: <span id="ultimaActualizacion">-</span></p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
