<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formas de Pago</title>
    <link rel="stylesheet" href="/css/mesas.css" />
</head>
<body>
    <header>
        <button class="btn-back" onclick="location.href='/dashboard-pizzeria.html'">← Panel</button>
        <h1>💳 Formas de Pago</h1>
        <div class="header-user">
            <span id="nombreUsuarioFP"></span>
            <button id="btnSalir" class="btn-back">Cerrar Sesión</button>
        </div>
    </header>

    <div class="container">
        <div class="acciones">
            <button id="btnNuevaFP" class="btn-primary">+ Nueva forma de pago</button>
        </div>
        <div class="tabla-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Descripción</th>
                        <th style="text-align:center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="bodyFormasPago"></tbody>
            </table>
        </div>
        <p id="mensajeVacioFP" class="mensaje-vacio" style="display:none">No hay formas de pago cargadas.</p>
    </div>

    <div id="modalFormaPago" class="modal-overlay">
        <div class="modal">
            <h3 id="tituloModalFP">Nueva forma de pago</h3>
            <form id="formFormaPago">
                <input type="hidden" id="inputIdFP" />
                <div class="campo">
                    <label>Descripción *</label>
                    <input type="text" id="inputDescripcionFP" placeholder="Ej: Efectivo" required />
                </div>
                <div class="modal-acciones">
                    <button type="button" id="btnCancelarFP" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/formas-pago.js"></script>
</body>
</html>
